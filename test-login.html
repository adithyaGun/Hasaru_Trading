<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login Debug Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
    h2 { color: #f87171; }
    .card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    input, select { background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 8px; width: 100%; box-sizing: border-box; margin-top: 4px; }
    button { background: #dc2626; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 8px; }
    button:hover { background: #b91c1c; }
    .log { background: #0d0d0d; border: 1px solid #333; border-radius: 6px; padding: 12px; white-space: pre-wrap; word-break: break-all; font-size: 13px; max-height: 300px; overflow-y: auto; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .info { color: #60a5fa; }
    label { font-size: 13px; color: #aaa; }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    .status { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .status.pass { background: #166534; color: #4ade80; }
    .status.fail { background: #7f1d1d; color: #f87171; }
  </style>
</head>
<body>
  <h2>🔍 Login Debug Tester — Hasaru Trading</h2>

  <div class="card">
    <h3 style="margin:0 0 12px;color:#fbbf24">Backend URL</h3>
    <label>API Base URL</label>
    <input id="apiUrl" value="http://localhost:5000/api" />
  </div>

  <div class="card">
    <h3 style="margin:0 0 12px;color:#fbbf24">1. Server Health Check</h3>
    <button onclick="checkHealth()">Check /api/health or /api/auth/login OPTIONS</button>
    <div id="healthLog" class="log" style="margin-top:8px">— not run —</div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 12px;color:#fbbf24">2. Login Test</h3>
    <div class="row">
      <div>
        <label>Email</label>
        <input id="email" value="admin@hasarutrading.com" />
      </div>
      <div>
        <label>Password</label>
        <input id="password" type="text" value="password123" />
      </div>
    </div>
    <button onclick="testLogin()">Test Login</button>

    <h4 style="color:#aaa;margin:12px 0 4px">Quick Fill:</h4>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button style="background:#1d4ed8" onclick="fill('admin@hasarutrading.com','password123')">Admin</button>
      <button style="background:#1d4ed8" onclick="fill('sales1@hasarutrading.com','password123')">Sales1</button>
      <button style="background:#1d4ed8" onclick="fill('sales2@hasarutrading.com','password123')">Sales2</button>
      <button style="background:#059669" onclick="fill('customer1@email.com','password123')">Customer1</button>
      <button style="background:#059669" onclick="fill('customer2@email.com','password123')">Customer2</button>
    </div>

    <div id="loginLog" class="log" style="margin-top:12px">— not run —</div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 12px;color:#fbbf24">3. Batch Test All Seed Users</h3>
    <button onclick="batchTest()">Test All Seed Credentials</button>
    <div id="batchLog" class="log" style="margin-top:8px">— not run —</div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 12px;color:#fbbf24">4. Change Password Test</h3>
    <div class="row">
      <div>
        <label>Old Password</label>
        <input id="oldPass" value="password123" />
      </div>
      <div>
        <label>New Password (same = no real change)</label>
        <input id="newPass" value="password123" />
      </div>
    </div>
    <small style="color:#888">Uses the token from the last successful login above.</small><br/>
    <button onclick="testChangePassword()">Test Change Password</button>
    <div id="changePassLog" class="log" style="margin-top:8px">— not run —</div>
  </div>

  <script>
    let lastToken = null;

    const base = () => document.getElementById('apiUrl').value.replace(/\/$/, '');
    const log = (id, html) => { document.getElementById(id).innerHTML = html; };

    function fill(email, pass) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = pass;
    }

    function fmt(obj) {
      return JSON.stringify(obj, null, 2);
    }

    function statusBadge(ok) {
      return `<span class="status ${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</span>`;
    }

    async function checkHealth() {
      const url = base() + '/auth/login';
      log('healthLog', `<span class="info">Sending OPTIONS to ${url}...</span>`);
      try {
        const r = await fetch(url, { method: 'OPTIONS' });
        log('healthLog',
          `<span class="ok">OPTIONS ${url}</span>\n` +
          `Status: ${r.status} ${r.statusText}\n` +
          `CORS Headers:\n` +
          `  access-control-allow-origin: ${r.headers.get('access-control-allow-origin') || '(none)'}\n` +
          `  access-control-allow-methods: ${r.headers.get('access-control-allow-methods') || '(none)'}\n` +
          `  access-control-allow-headers: ${r.headers.get('access-control-allow-headers') || '(none)'}`
        );
      } catch (e) {
        log('healthLog', `<span class="err">❌ Failed: ${e.message}\n\nPossible causes:\n- Backend not running on ${base()}\n- CORS blocking the request\n- Wrong API URL</span>`);
      }
    }

    async function testLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const url = base() + '/auth/login';

      log('loginLog', `<span class="info">POST ${url}\nPayload: {"email":"${email}","password":"${password}"}</span>`);

      try {
        const t0 = Date.now();
        const r = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const ms = Date.now() - t0;
        const json = await r.json();

        if (r.ok && json.success) {
          lastToken = json.data?.token;
          log('loginLog',
            `${statusBadge(true)} HTTP ${r.status} (${ms}ms)\n\n` +
            `<span class="ok">✅ Login successful!</span>\n\n` +
            `User:\n  id: ${json.data?.user?.id}\n  name: ${json.data?.user?.name}\n  role: ${json.data?.user?.role}\n  email: ${json.data?.user?.email}\n\n` +
            `Token: ${lastToken?.substring(0, 40)}...\n\nFull response:\n${fmt(json)}`
          );
        } else {
          log('loginLog',
            `${statusBadge(false)} HTTP ${r.status} (${ms}ms)\n\n` +
            `<span class="err">❌ Login failed: ${json.message}</span>\n\n` +
            `Full response:\n${fmt(json)}`
          );
        }
      } catch (e) {
        log('loginLog',
          `${statusBadge(false)}\n<span class="err">❌ Network/CORS error: ${e.message}\n\nCheck:\n- Is the backend running? (node server.js in /backend)\n- Is the API URL correct? (${base()})\n- Any CORS errors in browser DevTools Console?</span>`
        );
      }
    }

    async function batchTest() {
      const seeds = [
        { email: 'admin@hasarutrading.com',  password: 'password123', role: 'admin' },
        { email: 'sales1@hasarutrading.com', password: 'password123', role: 'sales_staff' },
        { email: 'sales2@hasarutrading.com', password: 'password123', role: 'sales_staff' },
        { email: 'customer1@email.com',       password: 'password123', role: 'customer' },
        { email: 'customer2@email.com',       password: 'password123', role: 'customer' },
      ];

      log('batchLog', '<span class="info">Running batch tests...</span>');
      const url = base() + '/auth/login';
      let output = '';

      for (const s of seeds) {
        try {
          const r = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: s.email, password: s.password })
          });
          const json = await r.json();
          const ok = r.ok && json.success;

          // Role check
          const roleMatch = ok && json.data?.user?.role === s.role;

          output +=
            `${statusBadge(ok)} ${s.email}\n` +
            `  HTTP: ${r.status} | Expected role: ${s.role} | Got: ${json.data?.user?.role ?? json.message}\n` +
            `  Role match: ${statusBadge(roleMatch)}\n\n`;
        } catch (e) {
          output += `${statusBadge(false)} ${s.email}\n  Error: ${e.message}\n\n`;
        }
      }

      log('batchLog', output || 'No results');
    }

    async function testChangePassword() {
      if (!lastToken) {
        log('changePassLog', '<span class="err">⚠️ No token — run a successful Login Test first.</span>');
        return;
      }
      const oldPassword = document.getElementById('oldPass').value;
      const newPassword = document.getElementById('newPass').value;
      const url = base() + '/auth/change-password';

      // Test with WRONG field name first (the old bug)
      let out = `<span class="info">Testing field name mismatch (old bug)...</span>\n`;
      try {
        const r1 = await fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${lastToken}` },
          body: JSON.stringify({ currentPassword: oldPassword, newPassword })
        });
        const j1 = await r1.json();
        out += `With <b>currentPassword</b> (old bug): ${statusBadge(r1.ok)} HTTP ${r1.status} — ${j1.message}\n\n`;
      } catch(e) { out += `currentPassword test error: ${e.message}\n\n`; }

      // Test with CORRECT field name (the fix)
      out += `<span class="info">Testing correct field name (fixed)...</span>\n`;
      try {
        const r2 = await fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${lastToken}` },
          body: JSON.stringify({ oldPassword, newPassword })
        });
        const j2 = await r2.json();
        out += `With <b>oldPassword</b> (fix): ${statusBadge(r2.ok)} HTTP ${r2.status} — ${j2.message}\n`;
      } catch(e) { out += `oldPassword test error: ${e.message}\n`; }

      log('changePassLog', out);
    }
  </script>
</body>
</html>
